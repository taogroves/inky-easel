name: inky-easel

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-inky_easel}
      MARIADB_USER: ${MARIADB_USER:-inky}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?Set MARIADB_PASSWORD in your env file}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD in your env file}
    volumes:
      - inky-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: webserver/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: ${API_DATABASE_URL:?Set API_DATABASE_URL in your env file}
      SERVICE_SECRET: ${SERVICE_SECRET:?Set SERVICE_SECRET in your env file}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?Set PUBLIC_BASE_URL in your env file}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in your env file}
      CONTENT_CACHE_MINUTES: ${CONTENT_CACHE_MINUTES:-15}
      FRAME_FIRMWARE_DIR: /app/frame-firmware
      FIRESTORE_MONGODB_URI: ${FIRESTORE_MONGODB_URI:?Set FIRESTORE_MONGODB_URI in your env file}
      FIRESTORE_MONGODB_DATABASE: ${FIRESTORE_MONGODB_DATABASE:-}
      FIRMWARE_RELEASES_COLLECTION: ${FIRMWARE_RELEASES_COLLECTION:-firmware_releases}
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-18080}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${PORTAL_DATABASE_URL:?Set PORTAL_DATABASE_URL in your env file}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in your env file}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in your env file}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?Set BETTER_AUTH_TRUSTED_ORIGINS in your env file}
      NEXT_PUBLIC_BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in your env file}
      API_BASE_URL: http://api:8000
      SERVICE_SECRET: ${SERVICE_SECRET:?Set SERVICE_SECRET in your env file}
      ADMIN_DASHBOARD_PASSWORD: ${ADMIN_DASHBOARD_PASSWORD:?Set ADMIN_DASHBOARD_PASSWORD in your env file}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:?Set NOMINATIM_USER_AGENT in your env file}
    ports:
      - "${PORTAL_BIND_ADDRESS:-127.0.0.1}:${PORTAL_HOST_PORT:-13000}:3000"

volumes:
  inky-db:
